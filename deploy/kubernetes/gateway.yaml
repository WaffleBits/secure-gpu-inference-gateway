apiVersion: v1
kind: Namespace
metadata:
  name: secure-gpu-inference
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: secure-gpu-inference
data:
  AUDIT_LOG_PATH: /var/log/gateway/audit.log
  PYTHONDONTWRITEBYTECODE: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-gpu-inference-gateway
  namespace: secure-gpu-inference
  labels:
    app.kubernetes.io/name: secure-gpu-inference-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: secure-gpu-inference-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secure-gpu-inference-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: secure-gpu-inference-gateway:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: gateway-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: audit-log
              mountPath: /var/log/gateway
      volumes:
        - name: audit-log
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: secure-gpu-inference-gateway
  namespace: secure-gpu-inference
  labels:
    app.kubernetes.io/name: secure-gpu-inference-gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: secure-gpu-inference-gateway
  ports:
    - name: http
      port: 8000
      targetPort: http
